<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#63B632">
  <meta name="description" content="Application des adhérent.e.s Rando's Lorraine">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rando's">
  <title>Rando's Lorraine</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/RL-chaussure.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/RL-chaussure.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div id="view-splash" class="splash">
      <div>
        <h1 class="splash__title"></h1>
        <div class="spinner" aria-label="Chargement"></div>
        <img src="icons/RL-logo.svg" alt="" class="splash__logo" width="152" height="110">
      </div>
    </div>

    <div id="view-main" class="hidden">
      <header class="app-bar">
        <button type="button" id="btn-back" class="app-bar__back hidden" aria-label="Retour">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <h1 id="app-bar-title" class="app-bar__title">Rando's Lorraine</h1>
        <span id="app-bar-icon" class="app-bar__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M13.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM9.8 8.9L7 23h2.1l1.8-8 2.1 2v6h2v-7.5l-2.1-2 .6-3C14.8 12 16.8 13 19 13v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1L6 8.3V13h2V9.6l1.8-.7"/></svg>
        </span>
      </header>
      <div id="screen-root"></div>
    </div>
  </div>

  <script src="js/qrcode.min.js"></script>
  <script src="js/app.js" type="module"></script>
</body>
</html>
